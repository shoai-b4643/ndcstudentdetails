<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
}

.container{
width:400px;
margin:auto;
margin-top:80px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h1{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:10px;
background:#27ae60;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Update Attendance</h1>

<form action="/update" method="POST">

<label>Student ID</label>
<input type="text" name="id">

<label>New Attendance</label>
<input type="text" name="attendance">

<button type="submit">Update</button>
<br><br>

<a href="/add_student_page">
<button style="background.#2980b9;">Add Student</button>
</a>
<br><br>

</form>

</div>

</body>

</html>
