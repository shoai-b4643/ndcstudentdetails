<style>
.results-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 15px;
}

.result-card {
    display: block;
    text-decoration: none;
    text-align: center;
    padding: 14px;
    background: #f8f9fa;
    border-radius: 10px;
    font-weight: bold;
    color: #333;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.result-card:hover {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
}
.result-card:hover {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    transform: translateY(-3px);
}
.results-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 10px;
}

.result-btn {
    display: block;
    text-decoration: none;
    text-align: center;
    padding: 12px;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
    font-weight: bold;
    border-radius: 8px;
    transition: 0.3s;
}

.result-btn:hover {
    background: linear-gradient(135deg, #43e97b, #38f9d7);
    transform: scale(1.03);
}
@media (max-width: 600px) {
    .results-grid {
        grid-template-columns: 1fr;
    }
}
</style>
