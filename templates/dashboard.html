<!DOCTYPE html>
<html>

<head>

<title>NDC Student Dashboard</title>

<style>

body{
font-family: Arial;
background-color:#f2f2f2;
}

.container{
width:400px;
margin:auto;
margin-top:60px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h1{
text-align:center;
color:#2c3e50;
}

p{
font-size:18px;
}

.logout{
display:block;
text-align:center;
margin-top:20px;
background:#3498db;
color:white;
padding:10px;
text-decoration:none;
border-radius:5px;
}

.logout:hover{
background:#2980b9;
}

</style>

</head>


<body>

<div class="container">

<h1>NDC Student Details</h1>

<img src="{{ url_for('static',filename='photos/'+student.photo) }}" width="120">

<p><b>Name:</b> {{ student.name }}</p>

<p><b>Attendance:</b> {{ student.attendance }}</p>

<p><b>Fees Balance:</b> {{ student.fees }}</p>

<p><b>Course:</b> {{ student.course }}</p>

<a class="logout" href="/">Logout</a>

</div>

</body>

</html>
