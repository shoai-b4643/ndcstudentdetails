<!DOCTYPE html>
<html>

<head>

<title>Admin Login</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
}

.container{
width:350px;
margin:auto;
margin-top:100px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h1{
text-align:center;
color:#2c3e50;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border-radius:5px;
border:1px solid gray;
}

button{
width:100%;
padding:10px;
background:#e67e22;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}

button:hover{
background:#ca6f1e;
}

</style>

</head>

<body>

<div class="container">

<h1>Admin Login</h1>

<form method="POST">

<label>Admin Name</label>
<input type="text" name="username" required>

<label>Admin Password</label>
<input type="password" name="password" required>

<button type="submit">Login</button>

</form>

</div>

</body>

</html>
