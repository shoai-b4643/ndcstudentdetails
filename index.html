<!DOCTYPE html>
<html>

<head>

<title>NDC Student Login</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
}

.container{
width:350px;
margin:auto;
margin-top:100px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

h1{
text-align:center;
color:#2c3e50;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border-radius:5px;
border:1px solid gray;
}

button{
width:100%;
padding:10px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}

button:hover{
background:#2980b9;
}

</style>

</head>


<body>

<div class="container">

<h1>Student Login</h1>

<form method="POST">

<label>Student ID</label>
<input type="text" name="student_id" required>

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">Login</button>

<br><br>
<a href="/admin">
<button type = "button">Admin Login</button>
</a>

</form>

</div>

</body>

</html>
